name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deployment gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Cache-Busting (Commit-SHA an lokale Skripte anhängen)
        run: |
          V="${GITHUB_SHA::8}"
          sed -i "s#__COMMIT_ID__#$V#g" index.html
          sed -i "s#src=\"main.js\"#src=\"main.js?v=$V\"#g" index.html
          sed -i "s#from './track.js'#from './track.js?v=$V'#g" main.js
          sed -i "s#from './audio.js'#from './audio.js?v=$V'#g" main.js
          echo "Cache-Busting-Version: $V"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Gesamtes Repo (statische Seite) hochladen
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
